<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FitLife - a mobile-first fitness companion with smart workouts, meal tracking, and personalized wellness guidance.">
  <title>FitLife</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <div class="auth-sheet-backdrop" id="auth-sheet-backdrop"></div>

  <main class="welcome-shell" id="welcome-shell">
    <div class="auth-theme-toggle">
      <button id="theme-toggle" class="btn-icon" data-tooltip="Dark Mode" aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <section class="welcome-hero" aria-label="Welcome to FitLife">
      <div class="welcome-copy animate-fade-in-up">
        <div class="welcome-kicker">
          <span>Welcome to</span>
          <span aria-hidden="true">👋</span>
        </div>
        <h1 class="welcome-title">Home Workout</h1>
        <p class="welcome-subtitle">The best fitness app in this century to accompany your sports, meals, and wellness goals.</p>
        <button type="button" id="open-login" class="btn welcome-cta">Get Started</button>
      </div>
    </section>

    <section class="auth-entry-sheet" id="auth-entry-sheet" aria-label="Login">
      <div class="auth-entry-card">
        <div class="auth-entry-inner">
          <div class="auth-entry-handle"></div>
          <div class="auth-sheet-logo">
            <div class="auth-logo-icon">🏋️</div>
            <span class="auth-logo-text">FitLife</span>
          </div>

          <div class="auth-entry-header">
            <div>
              <h2 class="auth-entry-title">Welcome Back</h2>
              <p class="auth-entry-subtitle">Sign in to continue your workouts, nutrition tracking, and progress.</p>
            </div>
            <button type="button" id="close-login" class="auth-sheet-close" aria-label="Close login">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          <form id="login-form" class="auth-form auth-sheet-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="login-email">Email Address</label>
              <div class="input-icon-wrap">
                <input type="email" id="login-email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </span>
              </div>
              <span id="login-email-error" class="form-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="login-password">Password</label>
              <div class="input-icon-wrap input-toggle-wrap">
                <input type="password" id="login-password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required style="padding-left: 44px;">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <button type="button" id="toggle-login-password" class="password-toggle" aria-label="Toggle password visibility">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span id="login-password-error" class="form-error"></span>
            </div>

            <div class="auth-options">
              <label class="checkbox-wrap" for="remember-me">
                <input type="checkbox" id="remember-me">
                <span class="checkmark"></span>
                <span style="font-size: 0.85rem; color: rgba(255,255,255,0.72);">Remember me</span>
              </label>
            </div>

            <button type="submit" id="login-btn" class="btn btn-primary auth-submit">Sign In</button>

            <div id="login-error-msg" class="form-error text-center" style="margin-bottom: 16px;"></div>
          </form>

          <div class="auth-footer">
            Don't have an account? <a class="auth-sheet-link" href="register.html">Create one</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dark-mode.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
