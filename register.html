<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your FitLife account — AI-powered fitness and diet management system.">
  <title>Register — FitLife</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <!-- Theme Toggle -->
  <div class="auth-theme-toggle">
    <button id="theme-toggle" class="btn-icon" data-tooltip="Dark Mode" aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <!-- Decorative Orbs -->
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-header">
          <div class="auth-logo">
            <div class="auth-logo-icon">🏋️</div>
            <span class="auth-logo-text">FitLife</span>
          </div>
          <h1 style="font-size: 1.25rem; margin-bottom: 4px;">Create Account</h1>
          <p class="auth-subtitle">Start your fitness journey today</p>
        </div>

        <!-- Register Form -->
        <form id="register-form" class="auth-form" novalidate>
          <!-- Full Name -->
          <div class="form-group">
            <label class="form-label" for="reg-name">Full Name <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <input type="text" id="reg-name" class="form-input" placeholder="John Doe" autocomplete="name" required>
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
            </div>
            <span id="reg-name-error" class="form-error"></span>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="reg-email">Email Address <span class="required">*</span></label>
            <div class="input-icon-wrap">
              <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
            </div>
            <span id="reg-email-error" class="form-error"></span>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label" for="reg-password">Password <span class="required">*</span></label>
            <div class="input-icon-wrap input-toggle-wrap">
              <input type="password" id="reg-password" class="form-input" placeholder="Min 6 characters" autocomplete="new-password" required style="padding-left: 44px;">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <button type="button" id="toggle-reg-password" class="password-toggle" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <!-- Password Strength Bar -->
            <div class="password-strength" id="password-strength">
              <div class="strength-segment" id="str-seg-1"></div>
              <div class="strength-segment" id="str-seg-2"></div>
              <div class="strength-segment" id="str-seg-3"></div>
              <div class="strength-segment" id="str-seg-4"></div>
            </div>
            <span id="strength-label" class="strength-text text-muted" style="font-size: 0.75rem;"></span>
            <span id="reg-password-error" class="form-error"></span>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label" for="reg-confirm">Confirm Password <span class="required">*</span></label>
            <div class="input-icon-wrap input-toggle-wrap">
              <input type="password" id="reg-confirm" class="form-input" placeholder="Re-enter password" autocomplete="new-password" required style="padding-left: 44px;">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </span>
              <button type="button" id="toggle-reg-confirm" class="password-toggle" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span id="reg-confirm-error" class="form-error"></span>
          </div>

          <!-- Submit -->
          <button type="submit" id="register-btn" class="btn btn-primary auth-submit">
            Create Account
          </button>

          <div id="register-error-msg" class="form-error text-center" style="margin-bottom: 16px;"></div>
        </form>

        <!-- Footer -->
        <div class="auth-footer">
          Already have an account? <a href="index.html?login=1">Sign in</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dark-mode.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
